<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt-Forge</title>
    <meta name="theme-color" content="#070707" />
    <meta
      name="description"
      content="Constructeur de prompts IA avancé pour chatbot et génération d'images."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg
      class="floral-bg"
      viewBox="0 0 800 900"
      xmlns="http://www.w3.org/2000/svg"
      fill="var(--white)"
      aria-hidden="true"
    >
      <g>
        <path d="M55,110 Q80,55 125,78 Q92,102 55,110Z" />
        <path d="M125,78 Q162,38 182,78 Q152,90 125,78Z" />
        <circle cx="138" cy="108" r="5" />
        <path d="M90,148 Q112,126 134,142 Q112,154 90,148Z" />
        <circle cx="140" cy="160" r="6" />
        <line
          x1="140"
          y1="166"
          x2="138"
          y2="215"
          stroke="var(--white)"
          stroke-width="0.8"
        />
        <path d="M138,186 Q126,180 123,188 Q132,193 138,186Z" />
        <path d="M138,200 Q150,194 152,202 Q145,208 138,200Z" />
      </g>
      <g>
        <path d="M632,65 Q655,25 688,45 Q662,65 632,65Z" />
        <path d="M688,45 Q715,18 730,45 Q706,56 688,45Z" />
        <circle cx="682" cy="78" r="5.5" />
        <line
          x1="682"
          y1="84"
          x2="680"
          y2="138"
          stroke="var(--white)"
          stroke-width="0.8"
        />
        <path d="M680,108 Q665,102 663,112 Q672,116 680,108Z" />
        <path d="M660,162 Q678,138 700,152 Q684,166 660,162Z" />
        <circle cx="700" cy="174" r="5" />
      </g>
      <g opacity="0.5">
        <path d="M42,740 Q62,698 96,716 Q70,733 42,740Z" />
        <circle cx="90" cy="750" r="4.5" />
        <line
          x1="90"
          y1="755"
          x2="88"
          y2="808"
          stroke="var(--white)"
          stroke-width="0.8"
        />
      </g>
      <g opacity="0.5">
        <path d="M692,798 Q708,764 736,778 Q714,793 692,798Z" />
        <circle cx="730" cy="808" r="4.5" />
        <line
          x1="730"
          y1="812"
          x2="728"
          y2="860"
          stroke="var(--white)"
          stroke-width="0.8"
        />
      </g>
    </svg>

    <div class="app">
      <header class="header">
        <h1 class="logo">Prompt<span>Forge</span></h1>
        <p class="subtitle">forgez des prompts IA précis — texte & image</p>
        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-diamond"></div>
          <div class="divider-line"></div>
        </div>
      </header>

      <div class="mode-tabs" role="tablist" aria-label="Mode de génération">
        <button
          class="mode-tab active"
          id="tab-chat"
          type="button"
          role="tab"
          aria-selected="true"
          aria-controls="panel-chat"
          tabindex="0"
          data-mode="chat"
        >
          ◈ &nbsp;Chatbot
        </button>
        <button
          class="mode-tab"
          id="tab-image"
          type="button"
          role="tab"
          aria-selected="false"
          aria-controls="panel-image"
          tabindex="-1"
          data-mode="image"
        >
          ◈ &nbsp;Génération d'images
        </button>
      </div>

      <div class="main-grid" id="builder">
        <!-- MODE CHATBOT -->
        <div
          class="mode-panel active"
          id="panel-chat"
          role="tabpanel"
          aria-labelledby="tab-chat"
          aria-hidden="false"
        >
          <div class="panel">
            <div class="panel-title">Modèles</div>
            <div class="templates">
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="chat"
                data-template-key="explain"
              >
                Expliquer un concept
              </button>
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="chat"
                data-template-key="debug"
              >
                Déboguer du code
              </button>
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="chat"
                data-template-key="write"
              >
                Rédiger un texte
              </button>
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="chat"
                data-template-key="analyze"
              >
                Analyser un texte
              </button>
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="chat"
                data-template-key="translate"
              >
                Traduire
              </button>
            </div>

            <div class="field">
              <label for="chat-role">Role / Persona</label>
              <input
                type="text"
                id="chat-role"
                placeholder="ex. ingénieur logiciel expert, rédacteur créatif..."
              />
            </div>
            <div class="field">
              <label for="chat-context">Contexte</label>
              <textarea
                id="chat-context"
                rows="2"
                placeholder="Informations de contexte que l'IA doit connaître..."
              ></textarea>
            </div>
            <div class="field">
              <label for="chat-task">Tâche</label>
              <textarea
                id="chat-task"
                rows="3"
                placeholder="Que veux-tu que l'IA fasse ?"
              ></textarea>
            </div>
          </div>

          <div class="panel">
            <div class="panel-title">Affinage</div>
            <div class="field">
              <label for="chat-format">Format de sortie</label>
              <select id="chat-format">
                <option value="">— aucun —</option>
                <option value="des points a puces">Points à puces</option>
                <option value="une liste numerotee">Liste numérotée</option>
                <option value="markdown">Markdown</option>
                <option value="du texte brut">Texte brut</option>
                <option value="JSON">JSON</option>
                <option value="un tableau">Tableau</option>
                <option value="un guide etape par etape">
                  Guide pas à pas
                </option>
              </select>
            </div>
            <div class="field">
              <label for="chat-tone">Ton</label>
              <select id="chat-tone">
                <option value="">— aucun —</option>
                <option value="professionnel">Professionnel</option>
                <option value="decontracte">Décontracté</option>
                <option value="technique">Technique</option>
                <option value="concis">Concis</option>
                <option value="detaille">Détaillé</option>
                <option value="creatif">Créatif</option>
                <option value="academique">Académique</option>
              </select>
            </div>
            <div class="field">
              <label for="chat-lang">Langue</label>
              <select id="chat-lang">
                <option value="">— par défaut —</option>
                <option value="anglais">Anglais</option>
                <option value="francais">Français</option>
                <option value="espagnol">Espagnol</option>
                <option value="allemand">Allemand</option>
                <option value="italien">Italien</option>
                <option value="portugais">Portugais</option>
              </select>
            </div>
            <div class="field">
              <label>Contraintes (Entrer pour ajouter)</label>
              <div
                class="tags-wrap"
                id="chat-constraints-wrap"
                data-focus-target="chat-constraints-input"
              >
                <input
                  class="tags-input"
                  id="chat-constraints-input"
                  data-tag-key="chat-constraints"
                  placeholder="ex. maximum 200 mots..."
                />
              </div>
            </div>
            <div class="field">
              <label>Exemples (Entrer pour ajouter)</label>
              <div
                class="tags-wrap"
                id="chat-examples-wrap"
                data-focus-target="chat-examples-input"
              >
                <input
                  class="tags-input"
                  id="chat-examples-input"
                  data-tag-key="chat-examples"
                  placeholder="ex. comme Einstein qui explique..."
                />
              </div>
            </div>
          </div>
        </div>

        <!-- MODE IMAGE -->
        <div
          class="mode-panel"
          id="panel-image"
          role="tabpanel"
          aria-labelledby="tab-image"
          aria-hidden="true"
        >
          <div class="panel">
            <div class="panel-title">Modèles</div>
            <div class="templates">
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="image"
                data-template-key="portrait"
              >
                Portrait
              </button>
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="image"
                data-template-key="landscape"
              >
                Paysage
              </button>
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="image"
                data-template-key="concept"
              >
                Art conceptuel
              </button>
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="image"
                data-template-key="product"
              >
                Packshot produit
              </button>
              <button
                class="tpl-btn"
                type="button"
                data-template-mode="image"
                data-template-key="abstract"
              >
                Abstrait
              </button>
            </div>

            <div class="field">
              <label for="img-subject">Sujet</label>
              <textarea
                id="img-subject"
                rows="2"
                placeholder="Quel est le sujet principal de l'image ?"
              ></textarea>
            </div>
            <div class="field">
              <label for="img-style">Style</label>
              <select id="img-style">
                <option value="">— aucun —</option>
                <option value="photorealistic">Photoréaliste</option>
                <option value="digital art">Art numérique</option>
                <option value="oil painting">Peinture à l'huile</option>
                <option value="watercolor">Aquarelle</option>
                <option value="anime">Anime</option>
                <option value="cinematic">Cinématographique</option>
                <option value="concept art">Art conceptuel</option>
                <option value="3D render">Rendu 3D</option>
                <option value="illustration">Illustration</option>
                <option value="dark fantasy">Fantasy sombre</option>
              </select>
            </div>
            <div class="field">
              <label for="img-mood">Ambiance</label>
              <select id="img-mood">
                <option value="">— aucun —</option>
                <option value="dramatic">Dramatique</option>
                <option value="ethereal">Éthérée</option>
                <option value="dark and moody">Sombre et mélancolique</option>
                <option value="warm and cozy">Chaleureux et cosy</option>
                <option value="mysterious">Mystérieuse</option>
                <option value="energetic">Énergique</option>
                <option value="serene">Sereine</option>
                <option value="epic">Épique</option>
              </select>
            </div>
          </div>

          <div class="panel">
            <div class="panel-title">Détails techniques</div>
            <div class="field">
              <label for="img-lighting">Lumière</label>
              <select id="img-lighting">
                <option value="">— aucun —</option>
                <option value="golden hour lighting">Heure dorée</option>
                <option value="studio lighting">Éclairage studio</option>
                <option value="dramatic chiaroscuro lighting">
                  Clair-obscur
                </option>
                <option value="soft diffused lighting">Douce et diffuse</option>
                <option value="neon lighting">Néon</option>
                <option value="moonlight">Lumière lunaire</option>
                <option value="backlit">Contre-jour</option>
              </select>
            </div>
            <div class="field">
              <label for="img-composition">Composition</label>
              <select id="img-composition">
                <option value="">— aucun —</option>
                <option value="close-up portrait">Gros plan</option>
                <option value="wide shot">Plan large</option>
                <option value="aerial view">Vue aérienne</option>
                <option value="low angle shot">Contre-plongée</option>
                <option value="symmetrical composition">Symétrique</option>
                <option value="rule of thirds">Règle des tiers</option>
              </select>
            </div>
            <div class="field">
              <label>Tags de qualité (Entrer)</label>
              <div
                class="tags-wrap"
                id="img-quality-wrap"
                data-focus-target="img-quality-input"
              >
                <input
                  class="tags-input"
                  id="img-quality-input"
                  data-tag-key="img-quality"
                  placeholder="ex. 8k, très détaillé..."
                />
              </div>
            </div>
            <div class="field">
              <label>Prompt négatif (Entrer)</label>
              <div
                class="tags-wrap"
                id="img-negative-wrap"
                data-focus-target="img-negative-input"
              >
                <input
                  class="tags-input"
                  id="img-negative-input"
                  data-tag-key="img-negative"
                  placeholder="ex. flou, basse qualité..."
                />
              </div>
            </div>
          </div>
        </div>

        <!-- SORTIE -->
        <div class="output-panel">
          <div class="output-header">
            <span class="output-title">Prompt généré</span>
            <div class="output-actions">
              <button class="action-btn" id="clear-btn" type="button">
                Effacer
              </button>
              <button class="action-btn" id="save-btn" type="button">
                Enregistrer
              </button>
              <button class="action-btn" id="export-btn" type="button">
                Export .txt
              </button>
              <button class="action-btn" id="share-btn" type="button">
                Partager
              </button>
              <button class="action-btn" id="copy-btn" type="button">
                Copier
              </button>
            </div>
          </div>
          <div
            class="output-text output-placeholder"
            id="output"
            aria-live="polite"
            aria-atomic="true"
          >
            <span class="output-placeholder"
              >Ton prompt apparaîtra ici au fur et à mesure que tu complètes les
              champs ci-dessus...</span
            >
          </div>
          <div class="char-count" id="char-count"></div>
        </div>
      </div>

      <!-- HISTORIQUE -->
      <div class="history-section">
        <div class="history-header">
          <span class="section-title">Historique</span>
          <button class="action-btn" id="clear-history-btn" type="button">
            Tout effacer
          </button>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty">
            Aucun prompt enregistré pour l'instant.
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>

    <button
      id="theme-btn"
      class="theme-btn"
      type="button"
      aria-label="Basculer le thème"
    >
      <svg
        id="icon-moon"
        class="theme-icon moon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
      <svg
        id="icon-sun"
        class="theme-icon sun"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
    </button>
  </body>
</html>
